<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch Visualizer</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6; 
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeIn 0.8s ease-in forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <div class="max-w-5xl mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600 mb-4">
                Pitch Visualizer
            </h1>
            <p class="text-lg text-gray-600 max-w-2xl mx-auto">
                Turn your narrative text into a stunning, multi-panel AI-generated storyboard.
            </p>
        </header>

        <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 mb-12">
            <form id="pitchForm" class="space-y-6">
                <div>
                    <label for="text" class="block text-sm font-medium text-gray-700 mb-2">Narrative Text (3-5 sentences)</label>
                    <textarea id="text" name="text" rows="4" 
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all resize-y"
                        placeholder="A group of explorers ventures deep into the glowing neon forest. They discover an ancient, metallic artifact humming with energy. Suddenly, the sky above them turns a fierce shade of crimson..."></textarea>
                </div>
                
                <div class="flex flex-col sm:flex-row gap-4 items-center justify-between">
                    <div class="w-full sm:w-1/3">
                        <label for="style" class="block text-sm font-medium text-gray-700 mb-2">Art Style</label>
                        <select id="style" name="style" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                            <option value="Realistic">Realistic / Cinematic</option>
                            <option value="Cartoon">Cartoon / Comic</option>
                            <option value="Anime">Anime / Manga</option>
                            <option value="Sci-Fi">Sci-Fi Concept Art</option>
                        </select>
                    </div>
                    
                    <button type="submit" id="generateBtn"
                        class="w-full sm:w-auto mt-auto px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl transition-colors shadow-sm shadow-blue-500/30 flex justify-center items-center gap-2">
                        <span>Generate Storyboard</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
                    </button>
                </div>
            </form>
        </section>

        <!-- Loading State -->
        <div id="loadingState" class="hidden flex-col items-center justify-center py-12">
            <div class="loader mb-6"></div>
            <h3 class="text-xl font-medium text-gray-800 mb-2">Generating your storyboard...</h3>
            <p class="text-gray-500 text-center max-w-md">This may take 10-30 seconds as our AI writes cinematic prompts and creates high-quality images for each scene.</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden p-4 rounded-xl bg-red-50 border border-red-100 text-red-600 mb-8 text-center font-medium">
        </div>

        <!-- Storyboard Grid -->
        <div id="storyboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Items will be injected here -->
        </div>
    </div>

    <script>
        document.getElementById('pitchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('generateBtn');
            const form = document.getElementById('pitchForm');
            const container = document.getElementById('storyboard');
            const loading = document.getElementById('loadingState');
            const error = document.getElementById('errorState');
            
            const text = document.getElementById('text').value;
            const style = document.getElementById('style').value;
            
            if (!text.trim()) {
                showError("Please enter some narrative text.");
                return;
            }

            // Reset UI
            container.innerHTML = '';
            error.classList.add('hidden');
            loading.classList.remove('hidden');
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, style })
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Terrible error occurred during generation.');
                }

                // It's a stream! Hide the main loading once the connection is established.
                // We will rely on real-time rendering.
                loading.classList.add('hidden');
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let index = 0;
                let buffer = "";
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    
                    // Process JSON lines continuously
                    let lines = buffer.split('\n');
                    buffer = lines.pop(); // keep remainder in buffer
                    
                    for (let line of lines) {
                        if (!line.trim()) continue;
                        
                        try {
                            const scene = JSON.parse(line);
                            
                            if (scene.error) {
                                showError(scene.error);
                                continue;
                            }
                            
                            const card = document.createElement('div');
                            card.className = "bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 fade-in flex flex-col";
                            
                            card.innerHTML = `
                                <div class="relative w-full aspect-square bg-gray-100 flex-shrink-0">
                                    <img src="${scene.image_url}" alt="${scene.original_text}" class="w-full h-full object-cover" onload="this.classList.remove('opacity-0')" loading="lazy" />
                                    <div class="absolute top-3 left-3 bg-white/90 backdrop-blur text-xs font-semibold px-2 py-1 rounded-md text-gray-800 shadow-sm">Scene ${index + 1}</div>
                                </div>
                                <div class="p-5 flex-grow flex flex-col">
                                    <p class="text-gray-800 font-medium mb-3 leading-relaxed">"${scene.original_text}"</p>
                                    <div class="mt-auto pt-4 border-t border-gray-50">
                                        <p class="text-xs text-gray-400 font-mono break-words line-clamp-2 hover:line-clamp-none cursor-pointer" title="AI Prompt: ${scene.enhanced_prompt}">
                                            AI Prompt: ${scene.enhanced_prompt}
                                        </p>
                                    </div>
                                </div>
                            `;
                            container.appendChild(card);
                            index++;
                        } catch (e) {
                            console.error("Error parsing stream chunk JSON:", e);
                        }
                    }
                }

            } catch (err) {
                loading.classList.add('hidden');
                showError(err.message);
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        });

        function showError(msg) {
            const error = document.getElementById('errorState');
            error.textContent = msg;
            error.classList.remove('hidden');
        }
    </script>
</body>
</html>
